<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head th:replace="~{fragments/layout :: head('Profissionais - Obras Link')}"></head>

<body>

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container" style="padding-top: 100px; min-height: 80vh;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2>Profissionais Cadastrados</h2>
            <a th:if="${isAdmin}" href="/prestadores/novo" class="btn btn-primary">Novo Profissional</a>
        </div>

        <div th:if="${mensagem}" class="alert alert-success"
            style="padding: 12px; background: #d4edda; color: #155724; border-radius: var(--radius-sm); margin-bottom: 20px;">
            <span th:text="${mensagem}"></span>
        </div>
        <div th:if="${mensagemErro}" class="alert alert-danger"
            style="padding: 12px; background: #f8d7da; color: #721c24; border-radius: var(--radius-sm); margin-bottom: 20px;">
            <span th:text="${mensagemErro}"></span>
        </div>

        <div class="table-responsive"
            style="background: #fff; border-radius: var(--radius-md); padding: 20px; box-shadow: var(--shadow-sm);">
            <table class="pure-table pure-table-horizontal" style="width: 100%;">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Experiência</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="prestador : ${prestadores}">
                        <td th:text="${prestador.nome}">João Silva</td>
                        <td th:text="${prestador.categoria.nome}">Pedreiro</td>
                        <td th:text="${prestador.anosExperiencia + ' anos'}">5 anos</td>
                        <td>
                            <a th:href="@{/prestadores/{id}(id=${prestador.id})}" class="btn btn-outline"
                                style="padding: 6px 12px; font-size: 0.8rem;">Ver</a>
                            <a th:if="${isAdmin or (auth.authenticated and auth.usuarioId == prestador.usuarioId)}"
                                th:href="@{/prestadores/{id}/editar(id=${prestador.id})}" class="btn btn-secondary"
                                style="color: var(--color-primary); border-color: var(--color-primary); padding: 6px 12px; font-size: 0.8rem;">Editar</a>
                            <form th:if="${isAdmin or (auth.authenticated and auth.usuarioId == prestador.usuarioId)}"
                                th:action="@{/prestadores/{id}/excluir(id=${prestador.id})}" method="post"
                                style="display: inline;" onsubmit="return confirm('Tem certeza que deseja excluir?');">
                                <button type="submit" class="btn"
                                    style="background: transparent; color: #e74c3c; border: 1px solid #e74c3c; padding: 6px 12px; font-size: 0.8rem;">Excluir</button>
                            </form>
                            <span th:if="${not (isAdmin or (auth.authenticated and auth.usuarioId == prestador.usuarioId))}"
                                  style="color: var(--color-text-muted); font-size: 0.85rem;">Somente leitura</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(prestadores)}">
                        <td colspan="4" style="text-align: center; padding: 40px;">Nenhum profissional cadastrado.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>

</html>
