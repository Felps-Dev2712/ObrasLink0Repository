<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head th:replace="~{fragments/layout :: head('Cadastro de Profissional - Obras Link')}"></head>

<body>

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container" style="padding-top: 100px; min-height: 80vh; max-width: 800px;">
        <h2 th:text="${prestador.id == null ? 'Novo Profissional' : 'Editar Profissional'}"
            style="margin-bottom: 24px;">Novo Profissional</h2>

        <div style="background: #fff; border-radius: var(--radius-md); padding: 32px; box-shadow: var(--shadow-sm);">
            <form class="pure-form pure-form-stacked"
                th:action="@{${prestador.id == null ? '/prestadores' : '/prestadores/' + prestador.id}}"
                th:object="${prestador}" method="post">

                <fieldset>
                    <div class="pure-g">
                        <div class="pure-u-1 pure-u-md-1-2" style="padding-right: 16px;">
                            <label for="nome">Nome Completo</label>
                            <input id="nome" type="text" th:field="*{nome}" class="pure-u-1" required>
                        </div>
                        <div class="pure-u-1 pure-u-md-1-2">
                            <label for="email">E-mail</label>
                            <input id="email" type="email" th:field="*{email}" class="pure-u-1" required
                                th:readonly="${not isAdmin}">
                        </div>

                        <div class="pure-u-1 pure-u-md-1-2" style="padding-right: 16px; margin-top: 16px;">
                            <label for="cpfCnpj">CPF / CNPJ</label>
                            <input id="cpfCnpj" type="text" th:field="*{cpfCnpj}" class="pure-u-1" required>
                        </div>
                        <div class="pure-u-1 pure-u-md-1-2" style="margin-top: 16px;">
                            <label for="whatsapp">WhatsApp</label>
                            <input id="whatsapp" type="text" th:field="*{whatsapp}" class="pure-u-1"
                                placeholder="Ex: 11999999999" required>
                        </div>
                        <div class="pure-u-1 pure-u-md-1-2" style="padding-right: 16px; margin-top: 16px;">
                            <label for="categoria">Especialidade (Categoria)</label>
                            <select id="categoria" th:field="*{categoria}" class="pure-u-1" required>
                                <option value="">Selecione...</option>
                                <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nome}">
                                </option>
                            </select>
                        </div>

                        <div class="pure-u-1 pure-u-md-1-2" style="margin-top: 16px;">
                            <label for="anosExperiencia">Anos de Experiência</label>
                            <input id="anosExperiencia" type="number" th:field="*{anosExperiencia}" class="pure-u-1"
                                min="0">
                        </div>
                        <div class="pure-u-1 pure-u-md-1-2" style="padding-right: 16px; margin-top: 16px;">
                            <label for="precoMinimo">Preço Mínimo / Hora (R$)</label>
                            <input id="precoMinimo" type="number" step="0.01" th:field="*{precoMinimo}"
                                class="pure-u-1">
                        </div>

                        <div class="pure-u-1" style="margin-top: 16px;">
                            <label for="descricao">Descrição / Resumo Profissional</label>
                            <textarea id="descricao" th:field="*{descricao}" class="pure-u-1" rows="4"></textarea>
                        </div>
                    </div>
                </fieldset>

                <hr style="border: 0; border-top: 1px solid var(--color-border); margin: 32px 0;">

                <fieldset>
                    <legend
                        style="font-family: var(--font-heading); font-weight: 600; font-size: 1.2rem; margin-bottom: 16px; border-bottom: none;">
                        Endereço</legend>
                    <div class="pure-g">
                        <div class="pure-u-1 pure-u-md-1-3" style="padding-right: 16px;">
                            <label for="cep">CEP</label>
                            <input id="cep" type="text" th:field="*{endereco.cep}" class="pure-u-1" required>
                        </div>
                        <div class="pure-u-1 pure-u-md-2-3">
                            <label for="logradouro">Logradouro</label>
                            <input id="logradouro" type="text" th:field="*{endereco.logradouro}" class="pure-u-1"
                                required>
                        </div>

                        <div class="pure-u-1 pure-u-md-1-3" style="padding-right: 16px; margin-top: 16px;">
                            <label for="numero">Número</label>
                            <input id="numero" type="text" th:field="*{endereco.numero}" class="pure-u-1" required>
                        </div>
                        <div class="pure-u-1 pure-u-md-2-3" style="margin-top: 16px;">
                            <label for="complemento">Complemento</label>
                            <input id="complemento" type="text" th:field="*{endereco.complemento}" class="pure-u-1">
                        </div>

                        <div class="pure-u-1 pure-u-md-1-3" style="padding-right: 16px; margin-top: 16px;">
                            <label for="bairro">Bairro</label>
                            <input id="bairro" type="text" th:field="*{endereco.bairro}" class="pure-u-1" required>
                        </div>
                        <div class="pure-u-1 pure-u-md-1-3" style="padding-right: 16px; margin-top: 16px;">
                            <label for="cidade">Cidade</label>
                            <input id="cidade" type="text" th:field="*{endereco.cidade}" class="pure-u-1" required>
                        </div>
                        <div class="pure-u-1 pure-u-md-1-3" style="margin-top: 16px;">
                            <label for="estado">Estado</label>
                            <input id="estado" type="text" th:field="*{endereco.estado}" class="pure-u-1" required>
                        </div>
                    </div>
                </fieldset>

                <div style="margin-top: 32px; display: flex; gap: 16px; justify-content: flex-end;">
                    <a href="/prestadores" class="btn btn-outline"
                        style="border: 1px solid var(--color-border); color: var(--color-text);">Cancelar</a>
                    <button type="submit" class="btn btn-primary" style="border: none;">Salvar Profissional</button>
                </div>
            </form>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>

</html>
