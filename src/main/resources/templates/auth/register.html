<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head th:replace="~{fragments/layout :: head('Cadastro - Obras Link')}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="padding-top: 120px; padding-bottom: 60px; min-height: 80vh; max-width: 900px;">
    <div style="background: #fff; border-radius: var(--radius-md); padding: 32px; box-shadow: var(--shadow-sm);">
        <h2 style="margin-bottom: 8px;">Criar conta</h2>
        <p style="color: var(--color-text-light); margin-bottom: 20px;">
            Escolha seu perfil: Cliente, Prestador, ou os dois.
        </p>

        <div th:if="${erro}" class="alert alert-danger"
             style="padding: 12px; background: #f8d7da; color: #721c24; border-radius: var(--radius-sm); margin-bottom: 16px;">
            <span th:text="${erro}"></span>
        </div>

        <form class="pure-form pure-form-stacked" th:action="@{/register}" th:object="${form}" method="post">
            <fieldset>
                <div class="pure-g">
                    <div class="pure-u-1 pure-u-md-1-2" style="padding-right: 16px;">
                        <label for="email">E-mail</label>
                        <input id="email" type="email" th:field="*{email}" class="pure-u-1" required>
                    </div>
                    <div class="pure-u-1 pure-u-md-1-4" style="padding-right: 16px;">
                        <label for="senha">Senha</label>
                        <input id="senha" type="password" th:field="*{senha}" class="pure-u-1" required>
                    </div>
                    <div class="pure-u-1 pure-u-md-1-4">
                        <label for="confirmarSenha">Confirmar Senha</label>
                        <input id="confirmarSenha" type="password" th:field="*{confirmarSenha}" class="pure-u-1" required>
                    </div>
                </div>

                <div style="margin-top: 20px; display: flex; gap: 24px; flex-wrap: wrap;">
                    <label class="pure-checkbox" style="font-weight: 600;">
                        <input type="checkbox" th:field="*{cadastroCliente}"> Quero me cadastrar como Cliente
                    </label>
                    <label class="pure-checkbox" style="font-weight: 600;">
                        <input type="checkbox" th:field="*{cadastroPrestador}"> Quero me cadastrar como Prestador
                    </label>
                </div>
            </fieldset>

            <hr style="border: 0; border-top: 1px solid var(--color-border); margin: 24px 0;">

            <fieldset>
                <legend style="font-weight: 700; margin-bottom: 16px;">Dados de Cliente</legend>
                <div class="pure-g">
                    <div class="pure-u-1 pure-u-md-1-3" style="padding-right: 16px;">
                        <label for="clienteNome">Nome</label>
                        <input id="clienteNome" type="text" th:field="*{clienteNome}" class="pure-u-1">
                    </div>
                    <div class="pure-u-1 pure-u-md-1-3" style="padding-right: 16px;">
                        <label for="clienteCpfCnpj">CPF/CNPJ</label>
                        <input id="clienteCpfCnpj" type="text" th:field="*{clienteCpfCnpj}" class="pure-u-1">
                    </div>
                    <div class="pure-u-1 pure-u-md-1-3">
                        <label for="clienteTelefone">Telefone</label>
                        <input id="clienteTelefone" type="text" th:field="*{clienteTelefone}" class="pure-u-1">
                    </div>
                </div>
            </fieldset>

            <hr style="border: 0; border-top: 1px solid var(--color-border); margin: 24px 0;">

            <fieldset>
                <legend style="font-weight: 700; margin-bottom: 16px;">Dados de Prestador</legend>
                <div class="pure-g">
                    <div class="pure-u-1 pure-u-md-1-3" style="padding-right: 16px;">
                        <label for="prestadorNome">Nome</label>
                        <input id="prestadorNome" type="text" th:field="*{prestadorNome}" class="pure-u-1">
                    </div>
                    <div class="pure-u-1 pure-u-md-1-3" style="padding-right: 16px;">
                        <label for="prestadorCpfCnpj">CPF/CNPJ</label>
                        <input id="prestadorCpfCnpj" type="text" th:field="*{prestadorCpfCnpj}" class="pure-u-1">
                    </div>
                    <div class="pure-u-1 pure-u-md-1-3">
                        <label for="categoriaId">Categoria</label>
                        <select id="categoriaId" th:field="*{categoriaId}" class="pure-u-1">
                            <option value="">Selecione...</option>
                            <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nome}"></option>
                        </select>
                    </div>
                    <div class="pure-u-1 pure-u-md-1-3" style="padding-right: 16px; margin-top: 16px;">
                        <label for="prestadorWhatsapp">WhatsApp</label>
                        <input id="prestadorWhatsapp" type="text" th:field="*{prestadorWhatsapp}" class="pure-u-1"
                               placeholder="Ex: 11999999999">
                    </div>
                    <div class="pure-u-1" style="margin-top: 16px;">
                        <label for="prestadorDescricao">Descricao profissional</label>
                        <textarea id="prestadorDescricao" th:field="*{prestadorDescricao}" class="pure-u-1" rows="4"></textarea>
                    </div>
                </div>
            </fieldset>

            <div style="margin-top: 32px; display: flex; gap: 16px; justify-content: flex-end;">
                <a th:href="@{/login}" class="btn btn-outline"
                   style="border: 1px solid var(--color-border); color: var(--color-text);">Ja tenho conta</a>
                <button type="submit" class="btn btn-primary" style="border: none;">Criar Conta</button>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>

</html>
