# Application
spring.application.name=obras-link
server.port=8080

# Database Configuration (overridden by docker-compose environment variables)
spring.datasource.url=jdbc:postgresql://localhost:5432/obraslink
spring.datasource.username=obraslink
spring.datasource.password=obraslink123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.com.obraslink=DEBUG
logging.level.org.springframework.web=INFO
